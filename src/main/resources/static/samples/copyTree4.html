// For this demo, the whole flat JSON is already available in the browser.
// Some records in the sample have children:true and state.loaded:false because
// your real app may lazy-load. For this no-lazy-load demo, normalize them so
// jsTree treats the already-present flat data as fully available.
const treeData = normalizeInitialTreeData(rawTreeData);

$(function () {
  // -------------------------------------------------------------------
  // Create jsTree from flat JSON
  // -------------------------------------------------------------------
  $("#tree").jstree({
    core: {
      check_callback: true,  // Required so create_node is allowed
      data: treeData
    }
  });

  // -------------------------------------------------------------------
  // When user selects a node, remember it.
  // This selected node can be either:
  //   1. the source node when clicking Copy, or
  //   2. the target parent node when clicking Paste.
  // -------------------------------------------------------------------
  $("#tree").on("select_node.jstree", function (e, data) {
    selectedNodeId = data.node.id;

    $("#copyBtn").prop("disabled", false);

    // Paste is only possible after a subtree has been copied.
    if (copiedRootId) {
      $("#pasteBtn").prop("disabled", false);
    }

    $("#status").text("Selected: " + data.node.text + " (" + data.node.id + ")");
  });

  // -------------------------------------------------------------------
  // Copy button:
  // We only remember the selected root id here.
  // The actual JSON copy is built later during Paste, using the current tree.
  // -------------------------------------------------------------------
  $("#copyBtn").on("click", function () {
    if (!selectedNodeId) return;

    copiedRootId = selectedNodeId;

    $("#pasteBtn").prop("disabled", false);
    $("#status").text("Ready to copy subtree from: " + copiedRootId);
  });

  // -------------------------------------------------------------------
  // Paste button:
  // Build modified JSON for the copied subtree, then insert each node.
  // -------------------------------------------------------------------
  $("#pasteBtn").on("click", function () {
    const tree = $("#tree").jstree(true);

    if (!copiedRootId || !selectedNodeId) return;

    // Optional safety check: do not paste a node into itself or its own child.
    if (isSameNodeOrDescendant(tree, copiedRootId, selectedNodeId)) {
      alert("Cannot paste a subtree into itself or into one of its own descendants.");
      return;
    }

    const newSubtreeJson = buildCopiedSubtreeJson(tree, copiedRootId, selectedNodeId);

    // Insert nodes one-by-one. Because newSubtreeJson is ordered as root first,
    // then descendants, each parent exists before its children are inserted.
    newSubtreeJson.forEach(function (node) {
      tree.create_node(node.parent, node, "last");
    });

    tree.open_node(selectedNodeId);

    $("#status").text(
      "Pasted " + newSubtreeJson.length + " node(s) under: " + selectedNodeId
    );
  });
});

// ---------------------------------------------------------------------
// Build a copied subtree as modified flat JSON.
//
// What this function does:
//   1. Finds the selected root and all descendants.
//   2. Gets their current JSON values.
//   3. Deep-copies the JSON so the original nodes are not changed.
//   4. Creates new jsTree ids.
//   5. Rewires parent values to preserve the subtree structure.
//   6. Clears database-related fields inside data.
// ---------------------------------------------------------------------
function buildCopiedSubtreeJson(tree, sourceRootId, targetParentId) {
  const sourceRootNode = tree.get_node(sourceRootId);

  // children_d means all descendants, not just direct children.
  // The root itself is not included in children_d, so we add sourceRootId first.
  const subtreeIds = [sourceRootId].concat(sourceRootNode.children_d);

  // Convert each jsTree node into a plain flat JSON object.
  const originalJsonNodes = subtreeIds.map(function (nodeId) {
    const node = tree.get_node(nodeId);
    return getCurrentNodeJson(node);
  });

  // Deep copy so editing copiedJsonNodes does not mutate the existing tree nodes.
  const copiedJsonNodes = deepCopy(originalJsonNodes);

  // Create a mapping from old jsTree id to new jsTree id.
  // Example:
  //   4_33  -> 4_1780679999999_1
  //   5_141 -> 5_1780679999999_2
  const idMap = createNewJsTreeIdMap(copiedJsonNodes);

  copiedJsonNodes.forEach(function (node, index) {
    const oldId = node.id;
    const oldParent = node.parent;

    // Assign new top-level jsTree node id.
    node.id = idMap[oldId];

    // Keep li_attr/a_attr ids in sync with the new jsTree id.
    node.li_attr = node.li_attr || {};
    node.li_attr.id = node.id;

    node.a_attr = node.a_attr || {};
    node.a_attr.href = node.a_attr.href || "#";
    node.a_attr.id = node.id + "_anchor";

    // Root of copied subtree goes under the selected paste target.
    // Descendants go under their copied parent, not the old parent.
    if (index === 0) {
      node.parent = targetParentId;
    } else {
      node.parent = idMap[oldParent];
    }

    // Reset jsTree runtime state for the newly pasted node.
    node.state = node.state || {};
    node.state.selected = false;
    node.state.loading = false;
    node.state.failed = false;
    node.state.loaded = true;

    // Remove lazy-loading marker from the copied JSON.
    // In this demo, the pasted subtree is already fully present.
    delete node.children;

    // This is your database-safe cleanup requirement.
    cleanCopiedNodeData(node);
  });

  return copiedJsonNodes;
}

// ---------------------------------------------------------------------
// Return the current live values from a jsTree node as plain flat JSON.
// We avoid using node.original only, because node.original can be stale if the
// node was renamed or modified after the tree was created.
// ---------------------------------------------------------------------
function getCurrentNodeJson(node) {
  const original = node.original || {};

  return {
    id: node.id,
    parent: node.parent,
    text: node.text,
    icon: node.icon,
    li_attr: deepCopy(node.li_attr || original.li_attr || {}),
    a_attr: deepCopy(node.a_attr || original.a_attr || { href: "#" }),
    state: deepCopy(node.state || original.state || {}),
    data: deepCopy(node.data || original.data || {})
  };
}

// ---------------------------------------------------------------------
// Create new jsTree ids for every copied node.
// The sample ids look like "level_databaseId", for example "4_33".
// For copied nodes we keep the level prefix, but replace the database part with
// a timestamp/counter so the new jsTree id is unique and not the old DB id.
// ---------------------------------------------------------------------
function createNewJsTreeIdMap(nodes) {
  const idMap = {};
  const timestamp = Date.now();

  nodes.forEach(function (node, index) {
    const level = node.data && node.data.level !== undefined
      ? node.data.level
      : getPrefixBeforeUnderscore(node.id);

    idMap[node.id] = level + "_" + timestamp + "_" + (index + 1);
  });

  return idMap;
}

// ---------------------------------------------------------------------
// Clear database-related fields from the copied node's data.
// Requirement:
//   data.id       -> cleared
//   data.parentId -> cleared
//   data.baseLineData -> excluded
//
// This only changes the copied node's data object. It does not change the
// visible jsTree id/parent used to display the tree structure.
// ---------------------------------------------------------------------
function cleanCopiedNodeData(node) {
  if (!node.data) return;

  node.data.id = null;
  node.data.parentId = null;

  delete node.data.baseLineData;
}

// ---------------------------------------------------------------------
// Prevent invalid paste: copying a node into itself or its own descendant.
// ---------------------------------------------------------------------
function isSameNodeOrDescendant(tree, sourceRootId, targetParentId) {
  if (sourceRootId === targetParentId) return true;

  const sourceRootNode = tree.get_node(sourceRootId);
  return sourceRootNode.children_d.indexOf(targetParentId) !== -1;
}

// ---------------------------------------------------------------------
// Normalize initial data for this standalone demo.
// Since sampleJson.txt already contains the flat data, we remove lazy markers
// and force loaded=true so jsTree can calculate children_d correctly.
// ---------------------------------------------------------------------
function normalizeInitialTreeData(data) {
  const copy = deepCopy(data);

  copy.forEach(function (node) {
    delete node.children;

    node.state = node.state || {};
    node.state.loaded = true;
    node.state.loading = false;
    node.state.failed = false;
    node.state.selected = false;
  });

  return copy;
}

function getPrefixBeforeUnderscore(value) {
  return String(value).split("_")[0];
}

function deepCopy(value) {
  return JSON.parse(JSON.stringify(value));
}
