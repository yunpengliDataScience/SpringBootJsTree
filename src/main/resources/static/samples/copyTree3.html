<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>jsTree Copy Subtree by Modifying Flat JSON</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.17/themes/default/style.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.17/jstree.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    button {
      padding: 6px 14px;
      margin-right: 8px;
    }

    #tree {
      margin-top: 20px;
    }

    #status {
      margin-top: 12px;
      color: #444;
    }
  </style>
</head>

<body>

<h2>jsTree Copy Subtree by Modifying Flat JSON</h2>

<button id="copyBtn" disabled>Copy</button>
<button id="pasteBtn" disabled>Paste</button>

<div id="status">Select a node first.</div>

<div id="tree"></div>

<script>
let selectedNodeId = null;
let copiedRootId = null;

const treeData = [
  {
    id: "LV1-1",
    parent: "#",
    text: "A1",
    data: {
      field1: "field1_A1",
      level: "LV1",
      name: "A1",
      databaseId: 1
    }
  },
  {
    id: "LV1-2",
    parent: "#",
    text: "A2",
    data: {
      field1: "field1_A2",
      level: "LV1",
      name: "A2",
      databaseId: 2
    }
  },
  {
    id: "LV2-3",
    parent: "LV1-2",
    text: "B3",
    data: {
      field1: "field1_B3",
      level: "LV2",
      name: "B3",
      databaseId: 3,
      field2: "field2_B3"
    }
  },
  {
    id: "LV2-4",
    parent: "LV1-2",
    text: "B4",
    data: {
      field1: "a",
      level: "LV2",
      name: "B4",
      databaseId: 4,
      field2: "b"
    }
  },
  {
    id: "LV2-7",
    parent: "LV1-2",
    text: "X",
    data: {
      field1: "1x",
      level: "LV2",
      name: "X",
      databaseId: 7,
      field2: "2x"
    }
  },
  {
    id: "LV2-8",
    parent: "LV1-2",
    text: "B5",
    data: {
      field1: "aa",
      level: "LV2",
      name: "B5",
      databaseId: 8,
      field2: "aa"
    }
  }
];

$(function () {
  $("#tree").jstree({
    core: {
      check_callback: true,
      data: treeData
    }
  });

  $("#tree").on("select_node.jstree", function (e, data) {
    selectedNodeId = data.node.id;

    $("#copyBtn").prop("disabled", false);

    if (copiedRootId) {
      $("#pasteBtn").prop("disabled", false);
    }

    $("#status").text("Selected: " + data.node.text + " (" + data.node.id + ")");
  });

  $("#copyBtn").on("click", function () {
    copiedRootId = selectedNodeId;

    $("#pasteBtn").prop("disabled", false);

    $("#status").text("Ready to copy subtree from: " + copiedRootId);
  });

  $("#pasteBtn").on("click", function () {
    const tree = $("#tree").jstree(true);

    if (!copiedRootId || !selectedNodeId) {
      return;
    }

	//Copy and manipulate subtree Json
    const copiedJsonNodes = buildCopiedSubtreeJson(
      tree,
      copiedRootId,
      selectedNodeId
    );

	//Build the new subtree
    copiedJsonNodes.forEach(function (node) {
      tree.create_node(node.parent, node, "last"); //create new node at the last position
    });

    tree.open_node(selectedNodeId);

    $("#status").text("Copied subtree under: " + selectedNodeId);
  });
});

function buildCopiedSubtreeJson(tree, rootId, targetParentId) {
  const rootNode = tree.get_node(rootId);

  //Construct array of node ids in subtree
  const subtreeIds = [rootId].concat(rootNode.children_d);

  //Extract json representation of each node in subtree
  const originalJsonNodes = subtreeIds.map(function (nodeId) {
    return tree.get_node(nodeId).original;
  });

  //Make a deep copy
  const copiedJsonNodes = deepCopy(originalJsonNodes);

  const idMap = {};
  const suffix = "_" + Date.now();

  //Construct map between old node id and new node id
  copiedJsonNodes.forEach(function (node) {
    idMap[node.id] = node.id + suffix;
  });

  //Iterate through copied json nodes to update node ids and rewire parent ids.  Also clean up data only related to old copied node.
  copiedJsonNodes.forEach(function (node, index) {
    const oldId = node.id;  //old id
    const oldParent = node.parent;  //old parent id

    node.id = idMap[oldId];  //update node id

	//update parent id
    if (index === 0) {
      node.parent = targetParentId;
    } else {
      node.parent = idMap[oldParent];
    }

	//Clear or reset data only belong or related to the old copied node
    if (node.data) {
      node.data.databaseId = null;
    }
  });

  return copiedJsonNodes;
}

function deepCopy(value) {
  return JSON.parse(JSON.stringify(value));
}
</script>

</body>
</html>
