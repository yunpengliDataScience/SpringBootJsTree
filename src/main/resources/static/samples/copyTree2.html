<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>jsTree Copy Subtree - Flat JSON</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.17/themes/default/style.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.17/jstree.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    button {
      padding: 6px 14px;
      margin-right: 8px;
    }

    #tree {
      margin-top: 20px;
    }

    #status {
      margin-top: 12px;
      color: #444;
    }
  </style>
</head>

<body>

<h2>jsTree Copy Subtree - Flat JSON</h2>

<button id="copyBtn" disabled>Copy</button>
<button id="pasteBtn" disabled>Paste</button>

<div id="status">Select a node first.</div>

<div id="tree"></div>

<script>
let selectedNodeId = null;
let copiedSubtree = null;

const treeData = [
  {
    id: "LV1-1",
    parent: "#",
    text: "A1",
    data: {
      field1: "field1_A1",
      level: "LV1",
      name: "A1",
      databaseId: 1
    }
  },
  {
    id: "LV1-2",
    parent: "#",
    text: "A2",
    data: {
      field1: "field1_A2",
      level: "LV1",
      name: "A2",
      databaseId: 2
    }
  },
  {
    id: "LV2-3",
    parent: "LV1-2",
    text: "B3",
    data: {
      field1: "field1_B3",
      level: "LV2",
      name: "B3",
      databaseId: 3,
      field2: "field2_B3"
    }
  },
  {
    id: "LV2-4",
    parent: "LV1-2",
    text: "B4",
    data: {
      field1: "a",
      level: "LV2",
      name: "B4",
      databaseId: 4,
      field2: "b"
    }
  },
  {
    id: "LV2-7",
    parent: "LV1-2",
    text: "X",
    data: {
      field1: "1x",
      level: "LV2",
      name: "X",
      databaseId: 7,
      field2: "2x"
    }
  },
  {
    id: "LV2-8",
    parent: "LV1-2",
    text: "B5",
    data: {
      field1: "aa",
      level: "LV2",
      name: "B5",
      databaseId: 8,
      field2: "aa"
    }
  }
];

$(function () {
  $("#tree").jstree({
    core: {
      check_callback: true,
      data: treeData
    }
  });

  $("#tree").on("select_node.jstree", function (e, data) {
    selectedNodeId = data.node.id;

    $("#copyBtn").prop("disabled", false);

    if (copiedSubtree) {
      $("#pasteBtn").prop("disabled", false);
    }

    $("#status").text("Selected: " + data.node.text);
  });

  $("#copyBtn").on("click", function () {
    const tree = $("#tree").jstree(true);

    copiedSubtree = collectSubtree(tree, selectedNodeId);

    $("#pasteBtn").prop("disabled", false);
    $("#status").text("Copied node: " + selectedNodeId);
  });

  $("#pasteBtn").on("click", function () {
    const tree = $("#tree").jstree(true);

    if (!copiedSubtree || !selectedNodeId) {
      return;
    }

    pasteSubtree(tree, copiedSubtree, selectedNodeId);

    tree.open_node(selectedNodeId);
    $("#status").text("Pasted under node: " + selectedNodeId);
  });
});

function collectSubtree(tree, rootId) {
  const rootNode = tree.get_node(rootId);

  const subtreeIds = [rootId].concat(rootNode.children_d);

  return subtreeIds.map(function (nodeId) {
    const node = tree.get_node(nodeId);

    return {
      oldId: node.id,
      oldParent: node.parent,
      text: node.text,
      data: deepCopy(node.data)
    };
  });
}

function pasteSubtree(tree, copiedSubtree, targetParentId) {
  const idMap = makeNewIdMap(copiedSubtree);

  copiedSubtree.forEach(function (oldNode, index) {
    const newId = idMap[oldNode.oldId];

    const newParentId =
      index === 0
        ? targetParentId
        : idMap[oldNode.oldParent];

    tree.create_node(newParentId, {
      id: newId,
      parent: newParentId,
      text: oldNode.text,
      data: deepCopy(oldNode.data)
    }, "last");
  });
}

function makeNewIdMap(copiedSubtree) {
  const idMap = {};
  const suffix = "_" + Date.now();

  copiedSubtree.forEach(function (node) {
    idMap[node.oldId] = node.oldId + suffix;
  });

  return idMap;
}

function deepCopy(obj) {
  return JSON.parse(JSON.stringify(obj));
}
</script>

</body>
</html>
